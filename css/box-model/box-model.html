<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Example</title>
    <style>
        .box{
            box-sizing: border-box;
            width: 200px;
            height: 200px;
            background-color: lightblue;
            padding: 50px;
            border: 5px solid blue;
            margin: auto
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Some heading</h1>
    </div>
</body>
</html>

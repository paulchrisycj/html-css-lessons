<!DOCTYPE html>
<html>
    <head>
        <title>This is a title tag</title>
    </head>
    <body>
        <h1>First heading</h1>
        <h2>Another heading</h2>
        <p>A paragraph text</p>
        <img src="assets/cat.jpg" alt="A picture of a cat" width="300">
        <!-- This is a comment block -->
        <!-- This will not be rendered by the program -->
        <!-- It serves the purpose of explaining/commenting for the programmer -->
        
        <!-- The next tags you will be learning are lists -->
        <!-- ul, ol, li -->
        <ul>
            <li><em>Basketball</em></li>
            <li><strong>Volleyball</strong></li>
            <li>Badminton</li>
        </ul>
        <ol>
            <li>Russia</li>
            <li>Malaysia
                <ul>
                    <li><b>Penang</b></li>
                    <li>KL</li>
                    <li>Selangor</li>
                    <li>Johor</li>
                </ul>
            </li>
            <li>Japan</li>
        </ol>
    </body>
</html>
